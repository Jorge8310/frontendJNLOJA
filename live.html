<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<body>
    <div class="game-wallpaper"></div>
    <div class="color-overlay"></div>

    <header>
        <div class="container-header">
            <div class="logo">JN<span>LOJA</span></div>
            <nav>
                <a href="index.html">VOLTAR À LOJA</a>
                <a href="tabelas.html">VER TABELAS</a>
            </nav>
        </div>
    </header>

    <main class="container live-page">
    <h1 class="title-glow">JN ARENA TV 📺</h1>
    
    <!-- PLAYER ÚNICO (ESTILO CINEMA) -->
    <div class="main-player-container">
        <div class="live-header" id="current-channel-title">
            <i class="fas fa-tv"></i> SELECIONE UM CANAL ABAIXO
        </div>
        
        <div class="video-container">
            <!-- O vídeo vai começar com a CazéTV por padrão -->
            <iframe 
                id="arenaPlayer"
                src="https://www.youtube.com/embed/live_stream?channel=UC_7S_uMv8zS_L_7YyD6q6yA" 
                frameborder="0" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

    <!-- SELETOR DE CANAIS (BOTÕES) -->
    <div class="channel-selector">
        <button class="btn-channel active" onclick="mudarCanal('fIBaDTsdd_A?si=y7TwMJGq-gKdHlCb', '⚽ FUTEBOL AO VIVO', this)">
            <i class="fas fa-futbol"></i> FUTEBOL
        </button>
    
        
        <button class="btn-channel" onclick="mudarCanal('UCt6Q_eGidX8VnL1PAsU89oA', '🔥 FREE FIRE ESPORTS', this)">
            <i class="fas fa-headset"></i> FREE FIRE
        </button>
        
        <button class="btn-channel" onclick="mudarCanal('UCWJ2lWNubArHWmf3FIHbfcQ', '🏀 NBA BRASIL', this)">
            <i class="fas fa-basketball-ball"></i> NBA
        </button>
        <button class="btn-channel" onclick="mudarCanal('https://pluto.tv/br/live-tv/5f120e94a5714d00074576a1', '🎬 CINEMA AO VIVO', this)">
    <i class="fas fa-film"></i> CINEMA
</button>
    </div>

    <p class="live-status"><i class="fas fa-circle"></i> Transmissão via YouTube Oficial</p>
</main>

    <footer>
        <p>JNLOJA &copy; 2026 - A melhor experiência Gamer.</p>
    </footer>
