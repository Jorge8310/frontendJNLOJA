<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JNLOJA | Classificação e Tabelas 🏆</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="game-wallpaper"></div>
    <div class="color-overlay"></div>

    <header>
        <div class="container-header">
            <div class="logo">JN<span>LOJA</span></div>
            <nav>
                <a href="index.html">VOLTAR À LOJA</a>
            </nav>
        </div>
    </header>

    <main class="container standings-page">
        <h1 class="title-glow">CLASSIFICAÇÃO GERAL 🏆</h1>
        
        <!-- Menu de Ligas -->
        <div class="standings-menu">
            <button onclick="mudarTabela(71)" class="btn-league active" id="btn-71">BRASILEIRÃO 🇧🇷</button>
            <button onclick="mudarTabela(39)" class="btn-league" id="btn-39">PREMIER LEAGUE 🏴󠁧󠁢󠁥󠁮󠁧󠁿</button>
            <button onclick="mudarTabela(140)" class="btn-league" id="btn-140">LA LIGA 🇪🇸</button>
            <button onclick="mudarTabela(135)" class="btn-league" id="btn-135">SERIE A 🇮🇹</button>
            <button onclick="mudarTabela(1)" class="btn-league" id="btn-1">COPA DO MUNDO 🏆</button>
        </div>

        <!-- ADICIONADO: Seletor de Temporada (Anos) -->
        <div class="year-selector" style="text-align: center; margin-bottom: 30px;">
            <label for="anoTemporada" style="color: var(--secondary); font-weight: bold; margin-right: 10px;">TEMPORADA:</label>
            <select id="anoTemporada" onchange="atualizarAno()" style="background: #222; color: #fff; border: 1px solid var(--secondary); padding: 10px; border-radius: 5px; cursor: pointer; outline: none;">
                <option value="2026" selected>2026 (Atual)</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
                <option value="2022">2022</option>
                <option value="2021">2021</option>
            </select>
        </div>
        

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>POS</th>
                        <th>TIME</th>
                        <th>PTS</th>
                        <th>J</th>
                        <th>V</th>
                        <th>SG</th>
                    </tr>
                </thead>
                <tbody id="standingsBody">
                    <tr><td colspan="6">Selecione uma liga para ver a tabela...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer>
        <p>JNLOJA &copy; 2026 - Resultados em tempo real.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // Função para detectar a mudança no seletor de anos
        function atualizarAno() {
            const anoSelecionado = document.getElementById('anoTemporada').value;
            // Chama a função mudarTabela passando a liga ativa (que o script.js já controla) e o ano novo
            if (typeof ligaAtiva !== 'undefined') {
                mudarTabela(ligaAtiva, anoSelecionado);
            } else {
                // Caso a variável global ainda não exista, usa o Brasileirão (71) como padrão
                mudarTabela(71, anoSelecionado);
            }
        }

        // Quando abrir a página, já carrega o Brasileirão 2026
        window.onload = () => mudarTabela(71, "2026");
    </script>
</body>
</html>
